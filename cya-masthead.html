<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CYA Soccer — Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=League+Spartan:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --purple-950:#1B0F38;
    --purple-700:#592B82;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ overflow-x:hidden; max-width:100%; }
  body{ font-family:'League Spartan', sans-serif; background:var(--purple-950); }

  .masthead{
    background:var(--purple-700);
    border-bottom:1px solid rgba(255,255,255,.1);
    padding:14px 40px;
  }

  .masthead-row{
    max-width:1280px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; gap:24px;
  }

  .brand-block{ display:flex; align-items:center; gap:13px; min-width:0; }
  .brand-block img{ height:34px; width:auto; flex-shrink:0; display:block; }
  .brand-text{ display:flex; flex-direction:column; justify-content:center; }
  .brand-text .name{
    font-family:'Bebas Neue', sans-serif; font-weight:400; font-size:26px;
    color:var(--white); letter-spacing:.03em; text-transform:uppercase; line-height:1;
    white-space:nowrap;
  }
  .brand-text .sub{
    font-family:'League Spartan', sans-serif; font-weight:600; font-size:10px;
    color:rgba(255,255,255,.55); letter-spacing:.08em; text-transform:uppercase;
    white-space:nowrap; margin-top:3px;
  }

  .pf-block{ flex-shrink:0; display:flex; align-items:center; gap:9px; }
  .pf-logo{ display:flex; align-items:center; }
  .pf-logo img{ height:26px; width:auto; opacity:.9; display:block; }
  .pf-caption{
    font-family:'League Spartan', sans-serif; font-style:italic; font-weight:500; font-size:10px;
    color:rgba(255,255,255,.6); letter-spacing:.02em; line-height:1.25; max-width:90px;
  }

  .social-row{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .social-icon{
    width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,.35); transition:background .15s, border-color .15s;
  }
  .social-icon:hover{ background:var(--white); border-color:var(--white); }
  .social-icon svg{ width:13px; height:13px; fill:var(--white); transition:fill .15s; }
  .social-icon:hover svg{ fill:var(--purple-700); }

  @media (max-width:760px){
    .masthead{ padding:10px 18px; }
    .masthead-row{ gap:14px; }
    .brand-block img{ height:26px; }
    .brand-text .name{ font-size:19px; }
    .brand-text .sub{ display:none; }
    .pf-logo img{ height:20px; }
    .pf-caption{ display:none; }
    .social-icon{ width:26px; height:26px; }
    .social-icon svg{ width:12px; height:12px; }
  }
</style>
</head>
