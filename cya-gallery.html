<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CYA Soccer — Kickin' Memories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=League+Spartan:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --purple-950:#1B0F38;
    --purple-700:#592B82;
    --cream-50:#FAF7FB;
    --ink-900:#221238;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:'Inter', sans-serif; background:var(--cream-50); color:var(--ink-900); }
  a{color:inherit; text-decoration:none;}

  .topbar{ background:var(--purple-950); padding:18px 24px; border-bottom:1px solid rgba(255,255,255,.14); }
  .topbar .wrap{ max-width:1180px; margin:0 auto; display:flex; align-items:center; gap:10px; }
  .topbar a{ color:rgba(255,255,255,.85); font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:6px; transition:color .15s; padding:9px 4px; text-decoration:none; }
  .topbar a:hover{ color:var(--white); text-decoration:none; }
  .topbar svg{ width:14px; height:14px; }

  .hero{
    background:linear-gradient(112deg, var(--purple-950) 0%, var(--purple-950) 58%, var(--purple-700) 58%, var(--purple-700) 100%);
    padding:70px 24px 50px; text-align:center;
  }
  .hero .eyebrow{ font-family:'League Spartan', sans-serif; font-size:12px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.7); }
  .division-title{ color:var(--white); font-family:'Bebas Neue', sans-serif; font-weight:400; font-size:64px; line-height:1; letter-spacing:.02em; text-transform:uppercase; margin-top:14px; }
  .hero .sub{ margin-top:12px; font-size:14.5px; font-weight:500; color:rgba(255,255,255,.8); }

  .gallery{ max-width:1180px; margin:0 auto; padding:44px 20px 60px; }
  .photo-grid{ display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; }
  .photo{ aspect-ratio:1; overflow:hidden; cursor:pointer; background:#E5DCEC; }
  .photo img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s ease; }
  .photo:hover img{ transform:scale(1.06); }

  .lightbox{
    position:fixed; inset:0; background:rgba(27,15,56,.94); z-index:200;
    display:none; align-items:center; justify-content:center; padding:40px 20px;
  }
  .lightbox.open{ display:flex; }
  .lightbox img{ max-width:100%; max-height:85vh; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .lightbox .close{
    position:absolute; top:24px; right:24px; width:44px; height:44px;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.3);
    border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .lightbox .close svg{ width:18px; height:18px; stroke:var(--white); }
  .lightbox .nav{
    position:absolute; top:50%; transform:translateY(-50%);
    width:52px; height:52px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.3);
    border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .lightbox .nav svg{ width:20px; height:20px; stroke:var(--white); }
  .lightbox .prev{ left:20px; }
  .lightbox .next{ right:20px; }

  .cta-block{ background:var(--purple-950); margin:0; padding:52px 24px; text-align:center; }
  .cta-block .wrap{ max-width:600px; margin:0 auto; }
  .cta-block h3{ color:var(--white); font-family:'Bebas Neue', sans-serif; font-weight:400; font-size:34px; letter-spacing:.02em; margin-bottom:10px; }
  .cta-block p{ color:rgba(255,255,255,.82); font-size:14.5px; font-weight:500; margin-bottom:22px; }
  .cta-btn{ display:inline-block; background:var(--white); color:var(--purple-950); font-family:'League Spartan', sans-serif; font-weight:700; font-size:14px; letter-spacing:.03em; text-transform:uppercase; padding:14px 30px; border-radius:4px; transition:opacity .15s; text-decoration:none; }
  .cta-btn:hover{ opacity:.85; text-decoration:none; }

  @media (max-width:900px){ .photo-grid{ grid-template-columns:repeat(3, 1fr); } }
  @media (max-width:640px){
    .hero{ padding:36px 20px 40px; }
    .division-title{ font-size:38px; }
    .photo-grid{ grid-template-columns:repeat(2, 1fr); gap:8px; }
    .lightbox .nav{ width:42px; height:42px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <a href="https://www.cyasoccer.org" target="_top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Home
    </a>
  </div>
</div>

<section class="hero">
  <span class="eyebrow">CYA Recreational Soccer</span>
  <h1 class="division-title">Kickin&rsquo; Memories</h1>
  <p class="sub">Fun photos submitted by our fans, players &amp; coaches. Tap any photo to enlarge.</p>
</section>

  <div class="photo-grid">
    <div class="photo" onclick="openLightbox(0)"><img src="https://static.wixstatic.com/media/1df62c_5664ad8fe9e54652a4a791cbd410f9ab~mv2.png" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(1)"><img src="https://static.wixstatic.com/media/1df62c_8593d046d30148269cd4066baeb156f2~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(2)"><img src="https://static.wixstatic.com/media/1df62c_628a353071c444f5818e8a7216f54259~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(3)"><img src="https://static.wixstatic.com/media/1df62c_8b8a8e50f8e349548e10cf39808658a8~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(4)"><img src="https://static.wixstatic.com/media/1df62c_bb77f7e9105e4bda9ef0025fa24d4fc2~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(5)"><img src="https://static.wixstatic.com/media/1df62c_d55f778268764a66a24b0e82545ca167~mv2.png" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(6)"><img src="https://static.wixstatic.com/media/1df62c_24a4700a326b43269a15c78ec778af09~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(7)"><img src="https://static.wixstatic.com/media/1df62c_8806a5a8025a43bdab0aa2af16c88951~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(8)"><img src="https://static.wixstatic.com/media/1df62c_360a279c990f4830985eb83623ffc73a~mv2.png" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(9)"><img src="https://static.wixstatic.com/media/1df62c_2a282565a41d4ad683a9cea1de1c3897~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(10)"><img src="https://static.wixstatic.com/media/1df62c_bb041c451aa14e30a51002f0c08d2e01~mv2.png" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(11)"><img src="https://static.wixstatic.com/media/1df62c_8ea1b7ca4e2b446498230d3fd8aa7a86~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(12)"><img src="https://static.wixstatic.com/media/1df62c_3c4bf9d3be3e46968c78bd8710fcc9fe~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(13)"><img src="https://static.wixstatic.com/media/1df62c_2aaae5667d6e4bc8a480c81aba315c18~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(14)"><img src="https://static.wixstatic.com/media/1df62c_2b7aa5a3f3cd48e7aaf0d4b5cfad2348~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
<div class="photo" onclick="openLightbox(15)"><img src="https://static.wixstatic.com/media/1df62c_92578e0f4d4f40d5a46cd118eb65e506~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>

<div class="photo" onclick="openLightbox(18)"><img src="https://static.wixstatic.com/media/1df62c_451838c507294898bf3f73eeb2c54f49~mv2.jpg" loading="lazy" alt="CYA Soccer photo"></div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="close" onclick="closeLightbox()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </div>
  <div class="nav prev" onclick="navLightbox(-1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
  </div>
  <img id="lightboxImg" src="" alt="CYA Soccer photo">
  <div class="nav next" onclick="navLightbox(1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>

</div>

<div class="cta-block">
  <div class="wrap">
    <h3>Ready To Register?</h3>

    <a class="cta-btn" href="https://chantillyyouth.ottosport.ai/_registration" target="_blank" rel="noopener">Register For Fall Soccer</a>
  </div>
</div>

<script>
  const photos = ["https://static.wixstatic.com/media/1df62c_5664ad8fe9e54652a4a791cbd410f9ab~mv2.png",
"https://static.wixstatic.com/media/1df62c_8593d046d30148269cd4066baeb156f2~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_628a353071c444f5818e8a7216f54259~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_8b8a8e50f8e349548e10cf39808658a8~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_bb77f7e9105e4bda9ef0025fa24d4fc2~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_d55f778268764a66a24b0e82545ca167~mv2.png",
"https://static.wixstatic.com/media/1df62c_24a4700a326b43269a15c78ec778af09~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_8806a5a8025a43bdab0aa2af16c88951~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_360a279c990f4830985eb83623ffc73a~mv2.png",
"https://static.wixstatic.com/media/1df62c_2a282565a41d4ad683a9cea1de1c3897~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_bb041c451aa14e30a51002f0c08d2e01~mv2.png",
"https://static.wixstatic.com/media/1df62c_8ea1b7ca4e2b446498230d3fd8aa7a86~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_3c4bf9d3be3e46968c78bd8710fcc9fe~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_2aaae5667d6e4bc8a480c81aba315c18~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_2b7aa5a3f3cd48e7aaf0d4b5cfad2348~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_92578e0f4d4f40d5a46cd118eb65e506~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_c6040f45f53d4fb58f92cfc68c901a3c~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_53830aa3b1014d48b57e05ff6da27610~mv2.jpg",
"https://static.wixstatic.com/media/1df62c_451838c507294898bf3f73eeb2c54f49~mv2.jpg"];
  let current = 0;
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightboxImg');

  function openLightbox(i){
    current = i;
    lbImg.src = photos[current];
    lb.classList.add('open');
  }
  function closeLightbox(){
    lb.classList.remove('open');
  }
  function navLightbox(dir){
    current = (current + dir + photos.length) % photos.length;
    lbImg.src = photos[current];
  }
  lb.addEventListener('click', (e) => {
    if (e.target === lb) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
  });
</script>

</body>
</html>
